name: Grozeo-Scheduler CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for exposed secrets
        run: |
          if grep -rn "AKIAQFHKOLNKPKGGCJN6\|mypharmacydev\|ZfDwOaOfDSUi\|fhGpLLpsjaQW\|Password_123" \
            --include="*.php" --include="*.json" --include="*.env" . 2>/dev/null; then
            echo "CRITICAL: Exposed credentials found!"
            exit 1
          fi

  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, redis, mbstring, xml, curl, bcmath
      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction
      - name: PHP Syntax Check
        run: find app routes config -name "*.php" -exec php -l {} \;
      - name: Verify no eval() in Finance files
        run: |
          if grep -rn "^\s*eval(" app/Finance/ 2>/dev/null; then
            echo "SECURITY: eval() found in Finance module!"
            exit 1
          fi
          echo "No eval() found in Finance module."

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: grozeo_scheduler_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-retries=3
      redis:
        image: redis:6
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, redis, mbstring, bcmath
      - name: Install dependencies
        run: composer install --no-interaction
      - name: Setup environment
        run: |
          cp .env.example .env
          sed -i 's/REPLACE_WITH_DB_HOST/127.0.0.1/' .env
          sed -i 's/REPLACE_WITH_DB_NAME/grozeo_scheduler_test/' .env
          sed -i 's/REPLACE_WITH_DB_USER/root/' .env
          sed -i 's/REPLACE_WITH_NEW_STRONG_PASSWORD/test_password/' .env
          sed -i 's/REPLACE_WITH_REDIS_HOST/127.0.0.1/' .env
          php artisan key:generate
      - name: Run migrations
        run: php artisan migrate --force
      - name: Run tests
        run: php artisan test

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [security, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy queue worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service grozeo-scheduler --detach
