name: Manage-Products CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for exposed credentials
        run: |
          if grep -rn "AKIAQFHKOLNKPKGGCJN6\|mypharmacydev\|ZfDwOaOfDSUi\|fhGpLLpsjaQW\|Password_123" \
            --include="*.php" --include="*.json" . 2>/dev/null; then
            echo "CRITICAL: Exposed credentials found!"
            exit 1
          fi

      - name: Verify no raw SQL injection vectors
        run: |
          # Warn if any filter foreach blocks remain unsanitized
          RAW=$(grep -rn "foreach.*\\\$filter.*\\\$val\['field'\]" modules/ \
            --include="*.php" 2>/dev/null | wc -l)
          if [ "$RAW" -gt 0 ]; then
            echo "WARNING: $RAW raw filter blocks found — review needed"
          else
            echo "SQL injection filter check passed."
          fi

      - name: Verify buildSafeFilterQuery coverage
        run: |
          TOTAL=$(grep -rln "\$_POST\['filter'\]\|\$data\['filter'\]" modules/ \
            --include="*.php" 2>/dev/null | wc -l)
          SAFE=$(grep -rln "buildSafeFilterQuery" modules/ \
            --include="*.php" 2>/dev/null | wc -l)
          echo "Filter modules total: $TOTAL | Safe: $SAFE"
          if [ "$TOTAL" -gt "$SAFE" ]; then
            echo "WARNING: $((TOTAL-SAFE)) modules still using raw filters"
          fi

  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP Syntax Check
        run: find modules includes -name "*.php" -exec php -l {} \; 2>&1 | grep -v "^No syntax errors" | head -20

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: [security, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to DigitalOcean App Platform
        run: |
          doctl apps create-deployment ${{ secrets.DO_APP_ID_MANAGE_PRODUCTS }} \
            --force-rebuild \
            --wait

      - name: Deployment complete
        run: echo "Manage-Products deployed to DigitalOcean successfully"
